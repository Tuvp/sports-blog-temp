      <p>This begins the second half of UVP Sports' coverage of the World Cup with possibly one of the more straightforward groupings in this tournament. Perennial underachievers Belgium share the stage with African giants Egypt. Many eyes will be on Iran (for off-field reasons more than on-field), while New Zealand enter as Oceania's sole representative.</p>

      <p><strong>NZL:</strong> New Zealand are by far and away Oceania's best team and didn't hesitate to show that in their qualification campaign. Their initial group stage saw them win all three of their games by a combined 19-1 aggregate. They went on to decimate Fiji 7-0 in the semis before making light work of New Caledonia (3-0) to book their spot.</p>

      <p><strong>EGY:</strong> Their last World Cup appearance was one to forget and fans will hope to quickly wash those memories away with better performances here. They are well-positioned to make the knockout stages from Group G.</p>
      <p><strong>IRN:</strong> A run of good outings here could serve as a welcome distraction from the turmoil at home for Iranian supporters. They'll be hoping to earn a healthy points tally and maybe even qualify for the knockouts.</p>
      <p><strong>NZL:</strong> New Zealand may be outmatched but the magic of the World Cup will keep their supporters optimistic. A first win could be on the cards for the All Whites, something that will delight their fans.</p>

      <br>

      <p>It's likely. Iran could seize three points against New Zealand in their opening fixture and go on to grab a point in their remaining two games. Four points should put them in the driver's seat to progress to the next round.</p>

      <p>This is the halfway stage of our series on UVP Sports and it could be one of the most exciting groups this World Cup has to offer. European giants Netherlands will look to make a long run in this tournament, while Japan hold probably the best chance out of any Asian team. Sweden have great talent across the field too and Tunisia will not be an easy team to beat.</p>

      <p><strong>SCO:</strong> Kieran Tierney will be looking to put his injury issues behind him and become a key player for Clarke's side. He might not start at his preferred left-back slot with Robertson available but the former Arsenal man could chip in with some vital contributions here and there.</p>

      <p><strong>HAI:</strong> Despite the results, it will be a memorable tournament for Haiti. It can only get better for the fans if they get a moment to savour, maybe a goal or maybe even more?</p>

      <p>Brazil and Morocco have more than enough to take spots 1 and 2 in this group, but Scotland could throw among the pigeons here. Haiti unfortunately look well off the level of their opponents and will not qualify.</p>

    body_html: `

      <br>
      <h2>4. …and what may not?</h2>
      <p><strong>MEX:</strong> There are some recognisable names up front and in midfield for Mexico but the backline could be a cause of concern. There has also been some eyebrows raised over the goalkeeping situation as expected starter Luis Malagon suffered an Achilles rupture in March ruling him out. It remains to be seen if Javier Aguirre goes back to Ochoa's experience or opts for Guadalajara's Raul Rangel.</p>
      <p><strong>KOR:</strong> Rumours are swirling around the atmosphere surrounding the team, with reports claiming that fans are largely not pleased with the work of manager Myung-bo. A legend in his own right in his playing days, the 57-year-old led the side during their 2014 campaign which ended without a win and questions have been asked over his ability to perform at this stage again.</p>
      <p><strong>RSA:</strong> Despite an overall improvement in their fortunes, South Africa have been wrecked by a pattern of inconsistency under Broos. They put in strong performances against higher-ranked Nigeria in both of their qualifying fixtures but failed to beat the likes of Rwanda and Zimbabwe, games they really had no business not winning. Further, the level of competition might just be a little too high in all honesty for this side.</p>
      <p><strong>CZE:</strong> A stunning loss to Faroe Islands certainly played a role in Czechia taking a longer route to get to the World Cup. Tomas Soucek was stripped of captaincy in November 2025 after the side's 6-0 win over Gibraltar in an incident involving fans. While cooler, more mature heads should prevail, ugly incidents like these could stop their campaign before it even begins.</p>

      <br>
      <h2>5. How will they line up?</h2>
      <p><strong>MEX:</strong> Edson Alvarez will anchor a solid midfield that is likely to feature Erik Lira and Gilberto Mora. Raul Jimenez is sure to start at front and Santiago Gimenez's recovery from injury will determine how much of a role he plays.</p>
      <p><strong>KOR:</strong> South Korea switched from a back four to a back three late in their qualification group, a move that caused some confusion. A central role for Son is likely with Lee set to occupy one of the wings but further down questions remain for the Asian side.</p>
      <p><strong>RSA:</strong> It's going to be the KISS principle here - Keep It Simple, South Africa. They have used different formations but will mostly go with a standard 4-2-3-1. Burnley's Lyle Foster will spearhead the attack alongside wingers Tshepang Moremi and Oswin Appollis, if recent fixtures are to go by.</p>
      <p><strong>CZE:</strong> A back three is definitely the way to go to get the best out of Czechia's best individual players. Getting balls in to their striker Patrick Schick will be their primary strategy to carve wins out.</p>

      <br>
      <h2>6. Who will put the team on their back?</h2>
      <p><strong>MEX:</strong> Fulham's Raul Jimenez. A career rivalling many works of fiction - coming back to the sport from a disastrous skull injury, suffering through further physical issues in the last World Cup, this home tournament presents a delightful chance to the veteran to establish himself as one of if not the greatest Mexicans to play the sport.</p>
      <p><strong>KOR:</strong> South Korea's fortunes hang on the boots of Son Heung-min. He leads MLS in assists at the time of writing but is yet to score and these mixed signals will cause concern among fans.</p>
      <p><strong>RSA:</strong> Teboho Mokoena in midfield will be critical if the African side have any hopes of progressing further in the tournament. He is expected to anchor the side as a 6 or play a further role.</p>
      <p><strong>CZE:</strong> Frontman Patrik Schick will need to carry his form from towards the end of the season, including a spell where he bagged 9 goals in 6 games. His 8 goals in qualifying were critical for the side and they will continue to depend on him.</p>

      <br>
      <h2>7. Who is the rising star?</h2>
      <p><strong>MEX:</strong> Gilberto Mora is a name whose performances have caught eyes across the Atlantic. The diminutive 17-year-old has already made around 50 pro appearances and could have a huge responsibility on his young shoulders.</p>
      <p><strong>KOR:</strong> Jens Castrop, the first foreign-born player to feature for the Taegeuk Warriors, played a solid role for Borussia Monchengladbach this year. The 22-year-old's versatility could be key for a side finding their defensive identity.</p>
      <p><strong>RSA:</strong> 21-year-old Relebohile Mofokeng was the winner of the South African league's young player of the year, bagging double-digit goals for Orlando Pirates. He could provide some much-needed spark in attack for a side that may struggle to score.</p>
      <p><strong>CZE:</strong> At 25, Pavel Sulc may not be the youngest in this list but he has all the makings of a late bloomer. The attacker excelled for Lyon with 25 goal contributions this season and provides much-needed impetus alongside Schick.</p>

      <br>
      <h2>8. Who could change the narrative around them or make some noise?</h2>
      <p><strong>MEX:</strong> Putting a forgettable stint at Besiktas behind him, Edson Alvarez will be raring to go at this World Cup. He is set to return to a relegated West Ham side so he may not stay with the Londoners but a strong World Cup will certainly invite suitors for the former Ajax star.</p>
      <p><strong>KOR:</strong> Lee Kang-in has been relegated to the shadows at PSG but definitely possesses the talent to do well in Europe's big leagues, as evidenced by his stint in La Liga. A few good performances here could get him a new home in Europe, one where he won't warm the bench.</p>
      <p><strong>RSA:</strong> Lyle Foster had a few bright moments in what was a dreadful season for Burnley. He will hope to have better fortunes on the international stage and maybe find a new home either in the Championship or the Premier League with a promoted side.</p>
      <p><strong>CZE:</strong> Matej Kovar spent a lot of time in Manchester United's youth setup but failed to impress, eventually moving to Germany before settling at PSV Eindhoven. This year, the shotstopper was brilliant for the side as they won the Eredivisie and he could earn a move to the top 5 leagues as well.</p>

      <br>
      <h2>9. What will the fans want?</h2>
      <p><strong>MEX:</strong> It is undoubtedly the quinto partido that will be on the minds of Mexicans. The stars look aligned well this time, with a fairly easy group and raucous home support but Javier Aguirre's men will need to seize the moment here to create a memorable campaign.</p>
      <p><strong>KOR:</strong> South Korea fans will be hoping that their team finds a patch of form and plays solid football. They enter the tournament with an ordinary run of results and will need to do really well to turn their fortunes around.</p>
      <p><strong>RSA:</strong> For South Africa, it will be moments of joy. As it stands, Bafana Bafana look well outmatched with a difficult draw but a win here or there or an opportunity to play spoilsport will be enticing.</p>
      <p><strong>CZE:</strong> A run to the knockout stage would delight Czechia fans. A long-awaited return to the tournament will only be made sweeter if they get past the group stage and they are primed to do so, especially with the availability of the third-place qualification spot.</p>

      <br>
      <h2>10. What is the must-watch game?</h2>
      <p>The tournament opener, Mexico vs South Africa. The 87,500 capacity Estadio Azteca in Mexico City will be absolutely bouncing on June 11 and the atmosphere will certainly be one to remember for a long time.</p>

      <br>
      <h2>11. Who gets through and who doesn't?</h2>
      <p>Expect Mexico to go through and comfortably so, topping the group. Besides the fan support, the altitude will also work in their favour. Czechia seem best positioned to seize second, even though one may argue South Korea boast more talent in their ranks. South Africa will surprise many if they don't finish last.</p>

      <br>
      <h2>12. Is there a third-place qualifier here?</h2>
      <p>Could be. South Korea or Czechia could get 4 points with a win over South Africa and a possible point from the other two, which should be enough for either team to finish as one of the best eight.</p>

  },

/* ── 2. Helpers ─────────────────────────────────────────────────── */
const $ = id => document.getElementById(id);
const esc = s => (s ?? "").toString()
  .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
  .replace(/"/g,"&quot;").replace(/'/g,"&#39;");

const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS   = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
function todayLine(){
  const d = new Date();
  return `${DAYS[d.getDay()]} · ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}

/* ── 3. Render: home feed ───────────────────────────────────────── */
function renderIssueBar(){ $("issue-bar").innerHTML = `<span>${esc(todayLine())}</span>`; }

function renderFeed(){
  if (!ARTICLES.length){
    $("feed").innerHTML = `<p class="loading-text">No stories yet.</p>`;
    return;
  }
  $("feed").innerHTML = ARTICLES.map(a => `
    <article class="article-card" data-id="${esc(a.id)}">
      <div class="article-img ${a.image_url ? "has-img" : ""}">
        ${a.image_url
          ? `<img src="${esc(a.image_url)}" alt="">`
          : `<svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">${a.image_svg || ""}</svg>`}
        <span class="article-img-label">${esc(a.image_label || "")}</span>
      </div>
      <div class="article-content">
        <span class="article-tag">${esc(a.tag)}</span>
        <h2 class="article-title">${esc(a.title)}</h2>
        <p class="article-sub">${esc(a.subtitle)}</p>
        <p class="article-byline">By <strong>${esc(a.author)}</strong> &nbsp;&middot;&nbsp; ${esc(a.read_time)}</p>
      </div>
    </article>
  `).join("");
  document.querySelectorAll(".article-card").forEach(card => {
    card.onclick = () => location.hash = `#/article/${card.dataset.id}`;
  });
}

/* ── 4. Render: single article ──────────────────────────────────── */
function renderArticle(a){
  const heroImg = a.image_url
    ? `<img src="${esc(a.image_url)}" alt="">`
    : `<svg viewBox="0 0 100 56" preserveAspectRatio="xMidYMid meet">${a.image_svg || ""}</svg>`;

  $("article-content").innerHTML = `
    <div class="article-hero">
      <span class="article-tag">${esc(a.tag)}</span>
      <h1 class="article-hero-title">${esc(a.title)}</h1>
      <p class="article-hero-sub">${esc(a.subtitle)}</p>
      <div class="article-meta">
        By <strong>${esc(a.author)}</strong>
        <span class="dot">&middot;</span>
        ${esc(a.date)}
        <span class="dot">&middot;</span>
        ${esc(a.read_time)}
      </div>
    </div>

    <div class="article-hero-img ${a.image_url ? "has-img" : ""}">${heroImg}</div>

    <article class="article-body">
      ${a.body_html}
      <div class="article-end">&#x273B; &#x273B; &#x273B;</div>
    </article>

    ${a.image_credit ? `<p class="image-credit">${esc(a.image_credit)}</p>` : ""}`;
}

/* ── 5. Router ──────────────────────────────────────────────────── */
function render(){
  const hash = location.hash || "#/";
  document.body.classList.remove("article-active");

  const m = hash.match(/^#\/article\/(.+)$/);
  if (m){
    const id = decodeURIComponent(m[1]);
    const a = ARTICLES.find(x => x.id === id);
    if (a){
      document.body.classList.add("article-active");
      renderArticle(a);
      window.scrollTo({ top: 0, behavior: "instant" });
      return;
    }
  }
  // Default: home view
  window.scrollTo({ top: 0, behavior: "instant" });
}

$("back-link").onclick = () => location.hash = "#/";

$("share-link").onclick = async () => {
  const btn = $("share-link");
  try {
    await navigator.clipboard.writeText(location.href);
  } catch (e) {
    // Fallback: select-and-copy via a temporary textarea
    const ta = document.createElement("textarea");
    ta.value = location.href;
    ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); } catch (_) {}
    document.body.removeChild(ta);
  }
  btn.textContent = "Copied";
  btn.classList.add("copied");
  clearTimeout(btn._t);
  btn._t = setTimeout(() => {
    btn.textContent = "Share";
    btn.classList.remove("copied");
  }, 1500);
};

window.addEventListener("hashchange", render);

// GoatCounter: count each hash-routed article view as a separate pageview.
window.addEventListener("hashchange", () => {
  if (window.goatcounter && typeof window.goatcounter.count === "function") {
    window.goatcounter.count({
      path:  location.pathname + location.search + location.hash,
      title: document.title,
    });
  }
});

renderIssueBar();
renderFeed();
render();
</script>
